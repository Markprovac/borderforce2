name: Actualiser les horaires GTFS trains

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * *"

permissions:
  contents: read

concurrency:
  group: borderforce-gtfs-refresh
  cancel-in-progress: false

jobs:
  refresh-gtfs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: borderforce/tools/gtfs

    env:
      KV_KEY: borderforce:train-alerts:schedule:v1
      WORKER_HEALTH_URL: https://borderforce-trains-breil.markrusten.workers.dev/alerts/health

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Installer le parseur GTFS
        run: npm install --no-audit --no-fund

      - name: Récupérer le planning précédent depuis Cloudflare KV
        shell: bash
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_KV_API_TOKEN: ${{ secrets.CF_KV_API_TOKEN }}
        run: |
          set -euo pipefail
          encoded_key=$(node -p 'encodeURIComponent(process.env.KV_KEY)')
          url="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/${encoded_key}"
          status=$(curl -sS -o previous-schedule.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CF_KV_API_TOKEN}" "$url")
          if [ "$status" = "404" ]; then
            rm -f previous-schedule.json
            echo "Aucun ancien planning : premier chargement."
          elif [ "$status" != "200" ]; then
            echo "Lecture KV refusée, HTTP $status"
            cat previous-schedule.json || true
            exit 1
          fi

      - name: Télécharger et préparer les GTFS
        run: npm run build

      - name: Envoyer le planning dans Cloudflare KV
        shell: bash
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_KV_API_TOKEN: ${{ secrets.CF_KV_API_TOKEN }}
        run: |
          set -euo pipefail
          encoded_key=$(node -p 'encodeURIComponent(process.env.KV_KEY)')
          url="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/${encoded_key}"
          curl --fail-with-body -sS -X PUT "$url" \
            -H "Authorization: Bearer ${CF_KV_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @schedule.json
          echo
          echo "Planning envoyé dans Cloudflare KV."

      - name: Attendre la propagation KV et vérifier le Worker
        shell: bash
        run: |
          sleep 65
          curl --fail-with-body -sS "$WORKER_HEALTH_URL"
          echo

      - name: Conserver le planning comme diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: borderforce-gtfs-schedule
          path: borderforce/tools/gtfs/schedule.json
          if-no-files-found: ignore
          retention-days: 7
