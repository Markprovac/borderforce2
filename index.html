<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Suite BorderForce</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{--bleu:#003366;--bleu2:#176ca8;--vert:#157a43;--fond:#eef3f8;--bord:#d6e1ec;--rouge:#b42318}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#172b42}
    body{
      min-height:100dvh;padding:16px;display:flex;align-items:center;justify-content:center;
      background-color:#003366;background-image:linear-gradient(rgba(0,51,102,.38),rgba(0,51,102,.55)),url("images/fond-tech3.jpg");
      background-repeat:no-repeat;background-size:cover;background-position:center;touch-action:manipulation;
    }
    .app{width:min(100%,520px);background:rgba(255,255,255,.97);border-radius:24px;padding:22px;box-shadow:0 14px 38px rgba(0,0,0,.34)}
    .title{text-align:center;margin-bottom:18px}.title-icon{width:62px;height:62px;margin:0 auto 10px;border-radius:18px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bleu),var(--bleu2));color:white;font-size:28px;box-shadow:0 7px 18px rgba(0,51,102,.25)}
    h1{font-size:1.45rem;color:var(--bleu);margin:0}.title p{margin:6px 0 0;color:#526477;font-size:.92rem}
    .section{margin:15px 0}.section-title{display:block;font-weight:800;color:var(--bleu);margin-bottom:8px;text-align:left}
    .choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.site-grid{grid-template-columns:1fr}
    .choice{position:relative}.choice input{position:absolute;opacity:0;pointer-events:none}.choice label{display:flex;align-items:center;gap:10px;min-height:58px;padding:12px;border:2px solid var(--bord);border-radius:15px;background:white;cursor:pointer;font-weight:750;transition:.15s}.choice label i{font-size:21px;color:var(--bleu)}
    .choice input:checked + label{border-color:var(--bleu);background:#eaf4ff;box-shadow:0 0 0 3px rgba(0,83,148,.12)}
    .choice.role-non input:checked + label{border-color:var(--vert);background:#eaf8f0}.choice.role-non label i{color:var(--vert)}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field label{display:block;font-weight:750;margin-bottom:5px;color:#29435f}.field.full{grid-column:1/-1}
    input[type=date],input[type=time]{width:100%;min-height:48px;border:1px solid #bfd0df;border-radius:12px;padding:9px 11px;font:inherit;background:white;font-size:16px}
    .start-btn{width:100%;min-height:54px;margin-top:18px;border:0;border-radius:15px;background:linear-gradient(135deg,var(--bleu),var(--bleu2));color:white;font-weight:850;font-size:1.05rem;cursor:pointer;box-shadow:0 7px 17px rgba(0,51,102,.25)}
    .start-btn:active{transform:scale(.985)}.error{display:none;margin-top:12px;padding:10px 12px;border-radius:11px;background:#fff0ef;color:var(--rouge);font-weight:700;text-align:left}
    .note{margin-top:14px;color:#5b6b7a;font-size:.82rem;line-height:1.35;text-align:center}
    @media(max-width:430px){body{padding:10px;align-items:flex-start}.app{border-radius:18px;padding:17px;margin-top:8px}.choice-grid,.form-grid{grid-template-columns:1fr}.field.full{grid-column:auto}}
  </style>
</head>
<body>
  <main class="app" id="missionFormCard">
    <div class="title">
      <div class="title-icon"><i class="fas fa-shield-halved"></i></div>
      <h1>Démarrer une mission</h1>
      <p>Le rôle et le site resteront mémorisés jusqu’à la fin du service.</p>
    </div>

    <form id="missionForm" novalidate>
      <div class="section">
        <span class="section-title">Êtes-vous chef de dispositif ?</span>
        <div class="choice-grid">
          <div class="choice">
            <input type="radio" id="roleChef" name="role" value="chef">
            <label for="roleChef"><i class="fas fa-user-shield"></i><span>Oui<br><small>Border Force</small></span></label>
          </div>
          <div class="choice role-non">
            <input type="radio" id="roleCompteur" name="role" value="compteur">
            <label for="roleCompteur"><i class="fas fa-chart-simple"></i><span>Non<br><small>Compteur</small></span></label>
          </div>
        </div>
      </div>

      <div class="section">
        <span class="section-title">Lieu de mission</span>
        <div class="choice-grid site-grid">
          <div class="choice"><input type="radio" id="siteBreil" name="site" value="Breil"><label for="siteBreil"><i class="fas fa-train"></i>Breil-sur-Roya</label></div>
          <div class="choice"><input type="radio" id="siteTurbie" name="site" value="La Turbie"><label for="siteTurbie"><i class="fas fa-road"></i>La Turbie</label></div>
          <div class="choice"><input type="radio" id="siteTende" name="site" value="DSI Tende"><label for="siteTende"><i class="fas fa-mountain"></i>DSI Tende</label></div>
        </div>
      </div>

      <div class="form-grid section">
        <div class="field full"><label for="missionDate">Date de mission</label><input type="date" id="missionDate" required></div>
        <div class="field"><label for="missionDebut">Heure de début</label><input type="time" id="missionDebut" required></div>
        <div class="field"><label for="missionFin">Heure de fin</label><input type="time" id="missionFin" required></div>
      </div>

      <button class="start-btn" type="submit"><i class="fas fa-play"></i> Démarrer la mission</button>
      <div id="missionError" class="error" role="alert"></div>
    </form>
    <div class="note">La question ne sera plus reposée pendant la mission. La remise à zéro de fin de service réactivera cet écran.</div>
  </main>

  <script>
  (() => {
    const MISSION_KEY = "bf_mission_session_v1";
    const lireMission = () => {
      try { return JSON.parse(localStorage.getItem(MISSION_KEY) || "null"); }
      catch (_) { localStorage.removeItem(MISSION_KEY); return null; }
    };
    const missionExistante = lireMission();
    if (missionExistante && missionExistante.active && (missionExistante.role === "chef" || missionExistante.role === "compteur")) {
      location.replace(missionExistante.role === "chef" ? "borderforce/index.html" : "compteur/index.html");
      return;
    }

    const dateInput = document.getElementById("missionDate");
    const now = new Date();
    const localDate = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0,10);
    dateInput.value = localDate;

    document.getElementById("missionForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const role = document.querySelector('input[name="role"]:checked')?.value || "";
      const site = document.querySelector('input[name="site"]:checked')?.value || "";
      const date = dateInput.value;
      const heureDebut = document.getElementById("missionDebut").value;
      const heureFin = document.getElementById("missionFin").value;
      const error = document.getElementById("missionError");

      if (!role || !site || !date || !heureDebut || !heureFin) {
        error.textContent = "Renseigne le rôle, le lieu, la date et les deux horaires avant de démarrer.";
        error.style.display = "block";
        return;
      }

      const mission = {active:true, role, site, date, heureDebut, heureFin, createdAt:Date.now(), updatedAt:Date.now()};
      localStorage.setItem(MISSION_KEY, JSON.stringify(mission));
      localStorage.setItem("siteSelection", site);

      if (role === "chef") {
        try {
          const ancien = JSON.parse(localStorage.getItem("borderforce") || "{}");
          ancien.site = site; ancien.date = date; ancien.heureDebut = heureDebut; ancien.heureFin = heureFin;
          localStorage.setItem("borderforce", JSON.stringify(ancien));
        } catch (_) {}
      }

      location.href = role === "chef" ? "borderforce/index.html" : "compteur/index.html";
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js").catch(err => console.error("SW registration failed", err));
    }
  })();
  </script>
</body>
</html>
